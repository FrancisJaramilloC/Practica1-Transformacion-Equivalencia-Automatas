<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automata Learning - Generador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Autómata Aprendizaje </h1>
        </header>

        <div class="main-content">
            <div class="card">
                <h2>Problema 1: Generador</h2>
                <div class="input-group">
                    <label>Alfabeto (Σ - separado por comas)</label>
                    <input type="text" id="alfabeto" value="a, b" placeholder="Ej: 0, 1">
                </div>
                <div class="input-group">
                    <label>Longitud Máxima (n)</label>
                    <input type="number" id="max_len" value="3" min="0" max="12">
                </div>
                <button id="btn-generar">Generar Cadenas</button>
            </div>

            <div class="card results-area">
                <div class="results-header">
                    <span id="label-conteo">Cadenas generadas: 0</span>
                    <span style="color: var(--text-dim); font-size: 0.8rem;">Resultados</span>
                </div>
                <div id="results-grid" class="grid">
                    <!-- Los resultados aparecerán aquí -->
                    <div style="grid-column: 1 / -1; text-align: center; color: var(--text-dim); margin-top: 2rem;">
                        Los resultados se mostrarán aquí
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
